<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda Tech</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>💻 Mi Tienda Tech</h1>
    </header>

    <main class="contenedor">
        <section class="seccion-productos">
            <h2>Nuestros Productos</h2>
            <div id="contenedor-productos" class="grid-productos">
                <p class="cargando">Cargando productos...</p>
            </div>
        </section>

        <section class="seccion-carrito">
            <h2>🛒 Tu Carrito</h2>
            <div id="contenido-carrito">
                </div>
            
            <div class="carrito-resumen">
                <h3>Total: $<span id="total-general">0.00</span></h3>
                <button id="btn-vaciar" class="btn-vaciar">Vaciar Carrito</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
